name: KISS Auto Package Updater

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git Configuration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up KISS Linux Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y b3sum
          sudo curl -sL https://codeberg.org/kiss-community/kiss/raw/branch/master/contrib/kiss-outdated -o /usr/local/bin/kiss-outdated
          sudo curl -sL https://codeberg.org/kiss-community/kiss/raw/branch/master/kiss -o /usr/local/bin/kiss
          sudo chmod +x /usr/local/bin/kiss-outdated /usr/local/bin/kiss
          echo "KISS environment ready."

      - name: Build KISS_PATH from .kiss_auto
        id: kisspath
        run: |
          [ -e ".kiss_auto" ] || { echo "No .kiss_auto found. Exiting."; exit 1; }

          # Build colon-separated KISS_PATH from all repodirs in .kiss_auto
          kiss_path=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in \#*) continue ;; esac
            repodir="${line%%,*}"
            abs="${GITHUB_WORKSPACE}/${repodir}"
            if [ -z "$kiss_path" ]; then
              kiss_path="$abs"
            else
              kiss_path="${kiss_path}:${abs}"
            fi
          done < .kiss_auto

          echo "KISS_PATH=$kiss_path" >> "$GITHUB_ENV"
          echo "Built KISS_PATH: $kiss_path"

      - name: Run KISS Auto Updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KISS_PROMPT: "0"
        run: |
          set -u

          git checkout master

          sort -u ".kiss_auto" | while read -r LINE; do
            [ -z "$LINE" ] && continue
            case "$LINE" in \#*) continue ;; esac

            repodir="${LINE%%,*}"
            pkgs="${LINE##*,}"

            pkg_regex=$(echo "$pkgs" | sed 's/ /|/g')

            outdated_list=$(kiss-outdated "$repodir" | grep -E "^($pkg_regex) " || true)

            [ -z "$outdated_list" ] && continue

            echo "$outdated_list" | while read -r PKG_LINE; do
              pkg="${PKG_LINE%% *}"
              newver="${PKG_LINE##* }"

              echo "==> Processing update for $pkg to version $newver"

              branch_name="update/${pkg}-${newver}"

              if gh pr list --state open --head "$branch_name" | grep -q "$branch_name"; then
                echo "PR for $branch_name already exists. Skipping."
                continue
              fi

              git checkout -b "$branch_name" origin/master

              cd "${repodir}/${pkg}"
              read -r oldver oldrel < version

              if [ "$oldver" = "$newver" ]; then
                echo "==> $pkg is already at $newver. Skipping."
                cd "${GITHUB_WORKSPACE}"
                git checkout master
                git branch -D "$branch_name" 2>/dev/null || true
                continue
              fi

              echo "$newver 1" > version

              if [ -f sources ]; then
                sed -i "s|${oldver}|${newver}|g" sources

                old_mm="${oldver%.*}"
                new_mm="${newver%.*}"
                if [ "$old_mm" != "$new_mm" ] && [ "$old_mm" != "$oldver" ]; then
                  sed -i "s|/${old_mm}/|/${new_mm}/|g" sources
                fi
              fi

              if kiss download "$pkg" && kiss checksum "$pkg"; then
                git add .
                git commit -m "CI: $pkg: bump to $newver"
                git push origin "$branch_name"

                gh pr create \
                  --title "$pkg: bump to $newver" \
                  --body "Automated update generated by CI. Bumping \`$pkg\` from \`$oldver\` to \`$newver\`." \
                  --base master \
                  --head "$branch_name"
              else
                echo "==> Failed to download/checksum $pkg $newver. Skipping."
              fi

              cd "${GITHUB_WORKSPACE}"
              git reset --hard
              git checkout master
              git branch -D "$branch_name" 2>/dev/null || true
            done
          done
