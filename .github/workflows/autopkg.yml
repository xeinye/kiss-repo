name: KISS Auto Package Updater

on:
  schedule:
    # Runs every Sunday at midnight (UTC)
    - cron: '0 0 * * 0'
  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can branch cleanly
          fetch-depth: 0

      - name: Set up Git Configuration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up KISS Linux Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y b3sum
          sudo curl -sL https://codeberg.org/kiss-community/kiss/raw/branch/master/contrib/kiss-outdated -o /usr/local/bin/kiss-outdated
          sudo curl -sL https://codeberg.org/kiss-community/kiss/raw/branch/master/kiss -o /usr/local/bin/kiss
          sudo chmod +x /usr/local/bin/kiss-outdated /usr/local/bin/kiss
          echo "KISS environment ready."

      - name: Run KISS Auto Updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KISS_PATH: ${{ github.workspace }}
          # Say yes to any kiss prompts
          KISS_PROMPT: "0"
        run: |
          set -u

          # Ensure the config file exists
          [ -e ".kiss_auto" ] || { echo "No .kiss_auto found. Exiting."; exit 1; }

          git checkout master

          sort -u ".kiss_auto" | while read -r LINE; do
            # Skip empty lines and comments
            [ -z "$LINE" ] && continue
            case "$LINE" in \#*) continue ;; esac

            # Parse repository directory and packages whitelist
            repodir="${LINE%%,*}"
            pkgs="${LINE##*,}"

            # Convert space-separated packages into a regex list (pkg1|pkg2|pkg3)
            pkg_regex=$(echo "$pkgs" | sed 's/ /|/g')

            # Fetch outdated packages and filter by our whitelist
            outdated_list=$(kiss-outdated "$repodir" | grep -E "^($pkg_regex) " || true)

            # If no updates, move to next repo line
            [ -z "$outdated_list" ] && continue

            echo "$outdated_list" | while read -r PKG_LINE; do
              # Parse kiss-outdated output: "pkgname oldver -> newver"
              pkg="${PKG_LINE%% *}"
              newver="${PKG_LINE##* }"

              echo "==> Processing update for $pkg to version $newver"

              branch_name="update/${pkg}-${newver}"

              # Skip if a PR already exists for this branch
              if gh pr list --state open --head "$branch_name" | grep -q "$branch_name"; then
                echo "PR for $branch_name already exists. Skipping."
                continue
              fi

              # Fresh branch from master
              git checkout -b "$branch_name" origin/master

              cd "${repodir}/${pkg}"
              read -r oldver oldrel < version

              if [ "$oldver" = "$newver" ]; then
                echo "==> $pkg is already at $newver. Skipping."
                cd "${GITHUB_WORKSPACE}"
                git checkout master
                git branch -D "$branch_name" 2>/dev/null || true
                continue
              fi

              # Bump version file
              echo "$newver 1" > version

              # Bump version references in sources (literal-version style)
              if [ -f sources ]; then
                # full version first (e.g. 3.0.1 -> 3.0.2)
                sed -i "s|${oldver}|${newver}|g" sources

                # major.minor path component (e.g. /4.12/ -> /4.14/)
                old_mm="${oldver%.*}"
                new_mm="${newver%.*}"
                if [ "$old_mm" != "$new_mm" ] && [ "$old_mm" != "$oldver" ]; then
                  sed -i "s|/${old_mm}/|/${new_mm}/|g" sources
                fi
              fi

              # Try to fetch new sources + regenerate checksums
              if kiss download "$pkg" && kiss checksum "$pkg"; then
                git add .
                git commit -m "CI: $pkg: bump to $newver"
                git push origin "$branch_name"

                gh pr create \
                  --title "$pkg: bump to $newver" \
                  --body "Automated update generated by CI. Bumping \`$pkg\` from \`$oldver\` to \`$newver\`." \
                  --base master \
                  --head "$branch_name"
              else
                echo "==> Failed to download/checksum $pkg $newver. Skipping."
              fi

              # Reset for the next package
              cd "${GITHUB_WORKSPACE}"
              git reset --hard
              git checkout master
              git branch -D "$branch_name" 2>/dev/null || true
            done
          done
